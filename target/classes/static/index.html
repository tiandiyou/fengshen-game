<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>封神榜 - 伐商演义</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:"Microsoft YaHei";background:#0a0a15;color:#fff;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.screen{display:none;min-height:100vh;flex-direction:column;padding:10px}
.screen.active{display:flex}

.title{font-size:20px;color:#ffd700;text-align:center;margin:15px 0;text-shadow:0 0 10px rgba(255,215,0,0.5)}
.subtitle{font-size:12px;color:#888;text-align:center;margin-bottom:15px}

/* 按钮 */
.btn{background:linear-gradient(180deg,#ff6b00,#c41e3a);border:2px solid #ffd700;color:#fff;padding:10px 20px;border-radius:20px;cursor:pointer;font-size:14px;margin:5px}
.btn:active{transform:scale(0.95)}
.btn-small{padding:6px 12px;font-size:12px}
.btn-green{background:linear-gradient(180deg,#27ae60,#1e8449)}
.btn-blue{background:linear-gradient(180deg,#3498db,#2980b9)}
.btn-purple{background:linear-gradient(180deg,#9b59b6,#8e44ad)}
.btn-gold{background:linear-gradient(180deg,#f39c12,#e67e22)}

/* 输入框 */
input{width:100%;padding:10px;border:2px solid #4a9eff;border-radius:8px;background:rgba(0,0,0,0.5);color:#fff;font-size:14px;margin-bottom:10px}
input::placeholder{color:#666}

/* 顶部状态栏 */
.top-bar{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,0.6);border-radius:8px;margin-bottom:10px;font-size:12px}
.resource{display:flex;gap:10px}
.resource span{display:flex;align-items:center;gap:3px}

/* 底部导航 */
.bottom-nav{display:flex;justify-content:space-around;padding:8px;background:rgba(0,0,0,0.8);position:fixed;bottom:0;width:100%;max-width:480px;border-top:1px solid #333}
.nav-item{display:flex;flex-direction:column;align-items:center;font-size:10px;color:#888;cursor:pointer;padding:5px 10px}
.nav-item.active{color:#ffd700}
.nav-item span{font-size:18px}

/* 卡片 */
.card{background:rgba(255,255,255,0.05);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid #333}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-title{font-size:14px;color:#ffd700}

/* 伙伴卡片 */
.partner-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-bottom:60px}
.partner-card{background:rgba(255,255,255,0.08);border-radius:10px;padding:10px;text-align:center;border:2px solid transparent}
.partner-card.selected{border-color:#ffd700;background:rgba(255,215,0,0.1)}
.partner-card.red{border-color:#e74c3c}
.partner-card.orange{border-color:#e67e22}
.partner-card.purple{border-color:#9b59b6}
.partner-card.blue{border-color:#3498db}
.avatar{width:50px;height:50px;border-radius:50%;background:rgba(0,0,0,0.5);margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-size:24px}
.name{font-size:12px;margin:3px 0}
.stats{font-size:10px;color:#888}
.star{color:#ffd700;font-size:10px}

/* 技能卡片 */
.skill-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding-bottom:60px}
.skill-card{background:rgba(255,255,255,0.08);border-radius:10px;padding:12px;border:2px solid #333}
.skill-card.level-1{border-color:#3498db}
.skill-card.level-2{border-color:#9b59b6}
.skill-card.level-3{border-color:#e67e22}
.skill-card.level-4{border-color:#e74c3c}
.skill-card.level-5{border-color:#ffd700}
.skill-name{font-size:14px;color:#fff;margin-bottom:5px}
.skill-desc{font-size:11px;color:#888;margin-bottom:8px}
.skill-stars{display:flex;gap:2px;margin-bottom:5px}
.skill-stars span{color:#ffd700;font-size:12px}
.skill-bonus{font-size:11px;color:#27ae60}

/* 联盟 */
.alliance-card{background:rgba(255,255,255,0.08);border-radius:10px;padding:15px;margin-bottom:10px}
.alliance-header{display:flex;justify-content:space-between;align-items:center}
.alliance-name{font-size:16px;color:#ffd700}
.alliance-members{font-size:12px;color:#888}

/* 排行榜 */
.rank-item{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.05);border-radius:8px;margin-bottom:5px}
.rank-num{font-size:18px;color:#ffd700;width:30px}
.rank-info{flex:1}
.rank-name{font-size:14px}
.rank-score{font-size:12px;color:#888}

/* 战斗 */
.battle-arena{background:rgba(0,0,0,0.5);border-radius:10px;padding:15px;margin-bottom:10px;min-height:200px}
.battle-side{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.battle-team{display:flex;gap:5px}
.battle-unit{width:40px;height:40px;border-radius:50%;background:rgba(255,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:18px}
.battle-unit.my{background:rgba(0,255,0,0.3)}
.vs{font-size:20px;color:#ffd700}
.battle-log{background:rgba(0,0,0,0.5);border-radius:8px;padding:10px;height:100px;overflow-y:auto;font-size:12px;margin-bottom:10px}

/* 弹窗 */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:1000}
.modal.active{display:flex}
.modal-content{background:#1a1a2e;border:2px solid #ffd700;border-radius:15px;padding:20px;max-width:320px;width:90%;text-align:center}
.modal-title{font-size:16px;color:#ffd700;margin-bottom:15px}
.modal-body{font-size:14px;margin-bottom:15px}
.modal-btns{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}

/* 标签页 */
.tabs{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto}
.tab{padding:8px 15px;background:rgba(255,255,255,0.1);border-radius:15px;font-size:12px;cursor:pointer}
.tab.active{background:#ffd700;color:#000}

/* 消息提示 */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);color:#fff;padding:15px 25px;border-radius:10px;font-size:14px;z-index:2000;display:none}
.toast.show{display:block;animation:fadeInOut 2s}
@keyframes fadeInOut{0%{opacity:0}20%{opacity:1}80%{opacity:1}100%{opacity:0}}

/* 加载中 */
.loading{text-align:center;padding:20px;color:#888}

/* 详情 */
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #333}
.detail-label{color:#888}
.detail-value{color:#ffd700}
</style>
</head>
<body>
<div id="app">

<!-- 登录页面 -->
<div id="login-screen" class="screen active">
    <div style="text-align:center;margin-top:50px">
        <div style="font-size:60px">⚔️</div>
        <div class="title" style="font-size:28px">封神榜</div>
        <div class="subtitle">伐商演义</div>
    </div>
    <div style="padding:20px">
        <input type="text" id="login-username" placeholder="用户名">
        <input type="password" id="login-password" placeholder="密码">
        <button class="btn" style="width:100%" onclick="doLogin()">登录</button>
        <button class="btn btn-purple" style="width:100%" onclick="showRegister()">注册账号</button>
    </div>
</div>

<!-- 注册页面 -->
<div id="register-screen" class="screen">
    <div class="title">注册账号</div>
    <div style="padding:20px">
        <input type="text" id="reg-username" placeholder="用户名">
        <input type="password" id="reg-password" placeholder="密码">
        <input type="text" id="reg-nickname" placeholder="昵称">
        <button class="btn" style="width:100%" onclick="doRegister()">注册</button>
        <button class="btn btn-small" style="width:100%" onclick="showScreen('login-screen')">返回登录</button>
    </div>
</div>

<!-- 主页面 -->
<div id="main-screen" class="screen">
    <div class="top-bar">
        <div class="resource">
            <span>💰<span id="gold">0</span></span>
            <span>💎<span id="lingqi">0</span></span>
        </div>
        <div>Lv.<span id="level">1</span></div>
    </div>
    
    <div class="tabs">
        <div class="tab active" onclick="switchTab('partners')">伙伴</div>
        <div class="tab" onclick="switchTab('skills')">技能</div>
        <div class="tab" onclick="switchTab('battle')">战斗</div>
        <div class="tab" onclick="switchTab('alliance')">联盟</div>
        <div class="tab" onclick="switchTab('season')">赛季</div>
    </div>
    
    <!-- 伙伴页 -->
    <div id="tab-partners" class="tab-content">
        <div class="card">
            <div class="card-header">
                <span class="card-title">我的伙伴</span>
                <button class="btn btn-small btn-green" onclick="doGacha()">抽卡</button>
            </div>
        </div>
        <div class="partner-grid" id="partner-list"></div>
    </div>
    
    <!-- 技能页 -->
    <div id="tab-skills" class="tab-content" style="display:none">
        <div class="card">
            <div class="card-header">
                <span class="card-title">我的技能</span>
                <button class="btn btn-small btn-gold" onclick="showSkillExchange()">兑换</button>
            </div>
        </div>
        <div class="skill-grid" id="my-skill-list"></div>
        
        <div class="card" style="margin-top:15px">
            <div class="card-title">可兑换技能</div>
        </div>
        <div class="skill-grid" id="skill-exchange-list"></div>
    </div>
    
    <!-- 战斗页 -->
    <div id="tab-battle" class="tab-content" style="display:none">
        <div class="battle-arena">
            <div class="battle-side">
                <div class="battle-team" id="battle-team1"></div>
                <div class="vs">VS</div>
                <div class="battle-team" id="battle-team2"></div>
            </div>
            <div class="battle-log" id="battle-log">选择队伍后点击战斗</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <button class="btn btn-green" onclick="doBattle()">开始战斗</button>
            <button class="btn btn-blue" onclick="simulateBattle()">阵容模拟</button>
        </div>
        <div class="card" style="margin-top:15px">
            <div class="card-title">队伍设置</div>
            <div id="team-list"></div>
        </div>
    </div>
    
    <!-- 联盟页 -->
    <div id="tab-alliance" class="tab-content" style="display:none">
        <div class="card">
            <div class="card-header">
                <span class="card-title">我的联盟</span>
                <button class="btn btn-small btn-purple" onclick="showAllianceCreate()">创建</button>
            </div>
            <div id="my-alliance"></div>
        </div>
        <div class="card">
            <div class="card-title">联盟列表</div>
            <div id="alliance-list"></div>
        </div>
    </div>
    
    <!-- 赛季页 -->
    <div id="tab-season" class="tab-content" style="display:none">
        <div class="card">
            <div class="card-title">当前赛季</div>
            <div id="current-season"></div>
        </div>
        <div class="card">
            <div class="card-title">封神榜排行</div>
            <div id="season-ranking"></div>
        </div>
        <div class="card">
            <div class="card-title">我的战功</div>
            <div id="my-credits"></div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-item active" onclick="showTab('partners')"><span>👥</span><span>伙伴</span></div>
        <div class="nav-item" onclick="showTab('skills')"><span>⚡</span><span>技能</span></div>
        <div class="nav-item" onclick="showTab('battle')"><span>⚔️</span><span>战斗</span></div>
        <div class="nav-item" onclick="showTab('alliance')"><span>🏰</span><span>联盟</span></div>
        <div class="nav-item" onclick="showTab('season')"><span>🏆</span><span>赛季</span></div>
    </div>
</div>

</div>

<!-- 弹窗 -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-title" id="modal-title">提示</div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-btns" id="modal-btns"></div>
    </div>
</div>

<!-- 提示 -->
<div id="toast" class="toast"></div>

<script>
// 全局变量
let playerId = localStorage.playerId || 0;
let username = localStorage.username || '';
let playerData = {};

// API基础URL
const API = '/api';

// 显示页面
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// 显示标签
function getQualityColor(q) {
        return q === 'red' ? 'e74c3c' : q === 'orange' ? 'e67e22' : q === 'purple' ? '9b59b6' : '3498db';
    }
    
    function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.getElementById('tab-' + tab).style.display = 'block';
    switchTab(tab);
}

function switchTab(tab) {
    if(tab === 'partners') loadPartners();
    if(tab === 'skills') loadSkills();
    if(tab === 'battle') loadBattle();
    if(tab === 'alliance') loadAlliance();
    if(tab === 'season') loadSeason();
}

// 提示消息
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// 弹窗
function modal(title, body, btns) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-body').innerHTML = body;
    document.getElementById('modal-btns').innerHTML = btns || '<button class="btn btn-small" onclick="closeModal()">关闭</button>';
    document.getElementById('modal').classList.add('active');
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

// 登录
async function doLogin() {
    const u = document.getElementById('login-username').value;
    const p = document.getElementById('login-password').value;
    if(!u || !p) return toast('请输入用户名和密码');
    
    const r = await fetch(API + '/player/login', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: u, password: p})
    }).then(r => r.json());
    
    if(r.success) {
        playerId = r.playerId;
        username = u;
        localStorage.playerId = playerId;
        localStorage.username = username;
        loadPlayerData();
        showScreen('main-screen');
    } else {
        toast(r.message || '登录失败');
    }
}

// 注册
async function doRegister() {
    const u = document.getElementById('reg-username').value;
    const p = document.getElementById('reg-password').value;
    const n = document.getElementById('reg-nickname').value || u;
    if(!u || !p) return toast('请输入用户名和密码');
    
    const r = await fetch(API + '/player/register', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: u, password: p, name: n})
    }).then(r => r.json());
    
    if(r.success) {
        toast('注册成功，请登录');
        showScreen('login-screen');
    } else {
        toast(r.message || '注册失败');
    }
}

// 加载玩家数据
async function loadPlayerData() {
    const r = await fetch(API + '/player/' + playerId).then(r => r.json());
    if(r.success) {
        playerData = r;
        document.getElementById('gold').textContent = r.gold || 0;
        document.getElementById('lingqi').textContent = r.lingqi || 0;
        document.getElementById('level').textContent = r.level || 1;
    }
}

// 加载伙伴
async function loadPartners() {
    const r = await fetch(API + '/gacha/partners/' + playerId).then(r => r.json());
    const list = document.getElementById('partner-list');
    
    if(!r.partners || r.partners.length === 0) {
        list.innerHTML = '<div style="grid-column:1/4;text-align:center;padding:30px;color:#888">暂无伙伴，去抽卡吧</div>';
        return;
    }
    
    list.innerHTML = r.partners.map(p => `
        <div class="partner-card ${p.quality}" data-id="${p.partnerId}">
            <img class="avatar" src="https://api.dicebear.com/9.x/initials/svg?seed=${p.name}&backgroundColor=${getQualityColor(p.quality)}&textColor=ffffff" style="width:50px;height:50px;border-radius:50%" onerror="this.src='${p.icon}'">
            <div class="name">${p.name}</div>
            <div class="star">${'★'.repeat(p.star)}</div>
            <div class="stats">攻${p.atk} 血${p.hp}</div>
        </div>
    `).join('');
}

// 抽卡
async function doGacha() {
    const r = await fetch(API + '/gacha/draw', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({playerId: playerId, type: 'single'})
    }).then(r => r.json());
    
    if(r.success && r.partner) {
        const p = r.partner;
        const colors = {red: 'e74c3c', orange: 'e67e22', purple: '9b59b6', blue: '3498db'};
        modal('抽卡结果', `
            <div style="border:3px solid #${colors[p.quality]};border-radius:15px;padding:20px;margin:10px 0">
                <div style="font-size:50px">${p.icon}</div>
                <div style="font-size:18px;color:#${colors[p.quality]}">${p.name}</div>
                <div>${p.faction} · ${p.quality} · ${p.type}</div>
            </div>
        `);
        loadPartners();
        loadPlayerData();
    } else {
        toast(r.message || '抽卡失败');
    }
}

// 加载技能
async function loadSkills() {
    // 我的技能
    const my = await fetch(API + '/skill/my?playerId=' + playerId).then(r => r.json());
    const myList = document.getElementById('my-skill-list');
    
    if(my.success && my.skills && my.skills.length > 0) {
        myList.innerHTML = my.skills.map(s => `
            <div class="skill-card level-${s.level}">
                <div class="skill-name">${s.name}</div>
                <div class="skill-stars">${'★'.repeat(s.stars)}</div>
                <div class="skill-bonus">效果+${Math.round((s.bonus-1)*100)}%</div>
                ${s.stars < 6 ? '<button class="btn btn-small btn-green" onclick="upgradeSkill('+s.id+')">升级</button>' : ''}
            </div>
        `).join('');
    } else {
        myList.innerHTML = '<div style="grid-column:1/3;text-align:center;padding:20px;color:#888">暂无技能</div>';
    }
    
    // 可兑换技能
    const all = await fetch(API + '/skill/list').then(r => r.json());
    const exList = document.getElementById('skill-exchange-list');
    exList.innerHTML = all.skills.map(s => `
        <div class="skill-card level-${s.level}">
            <div class="skill-name">${s.name}</div>
            <div class="skill-desc">${s.requireHeroes ? '需要: ' + s.requireHeroes.join(', ') : ''}</div>
            <button class="btn btn-small btn-gold" onclick="exchangeSkill(${s.id})">兑换</button>
        </div>
    `).join('');
}

// 兑换技能
async function exchangeSkill(skillId) {
    const partners = await fetch(API + '/skill/heroes?playerId=' + playerId).then(r => r.json());
    if(!partners.heroes || partners.heroes.length === 0) {
        return toast('没有可消耗的武将');
    }
    
    const options = partners.heroes.slice(0,5).map((p,i) => 
        `<button class="btn btn-small" onclick="doExchangeSkill(${skillId},${p.id})">${p.name}</button>`
    ).join('');
    
    modal('选择消耗的武将', '选择1个武将消耗:', options);
}

async function doExchangeSkill(skillId, heroId) {
    closeModal();
    const r = await fetch(API + '/skill/exchange', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({playerId: playerId, skillId: skillId, heroId: heroId})
    }).then(r => r.json());
    
    if(r.success) {
        toast('技能兑换成功');
        loadSkills();
    } else {
        toast(r.message);
    }
}

// 加载战斗
async function loadBattle() {
    const r = await fetch(API + '/team/list?playerId=' + playerId).then(r => r.json());
    const list = document.getElementById('team-list');
    list.innerHTML = r.teams ? r.teams.map(t => `
        <div class="card" style="padding:8px;margin:5px 0">
            <div>队伍${t.teamIndex+1}: ${t.partners.map(p=>p?p.name:'空').join(' | ')}</div>
        </div>
    `).join('') : '<div style="color:#888">暂无队伍</div>';
}

async function doBattle() {
    toast('战斗功能开发中...');
}

async function simulateBattle() {
    const r = await fetch(API + '/war/simulate', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({team1: [1,2], team2: [1,2]})
    }).then(r => r.json());
    
    if(r.success) {
        const log = r.battle.logs.join('<br>');
        document.getElementById('battle-log').innerHTML = log;
    }
}

// 加载联盟
async function loadAlliance() {
    // 我的联盟
    const my = await fetch(API + '/alliance/my?playerId=' + playerId).then(r => r.json());
    const myDiv = document.getElementById('my-alliance');
    
    if(my.success && my.alliance) {
        myDiv.innerHTML = `
            <div class="alliance-header">
                <div class="alliance-name">${my.alliance.name}</div>
                <div>${my.alliance.icon}</div>
            </div>
            <div class="alliance-members">成员: ${my.alliance.memberCount}/20</div>
        `;
    } else {
        myDiv.innerHTML = '<div style="color:#888">未加入联盟</div>';
    }
    
    // 联盟列表
    const list = await fetch(API + '/alliance/list').then(r => r.json());
    const listDiv = document.getElementById('alliance-list');
    listDiv.innerHTML = (list.alliances || []).map(a => `
        <div class="alliance-card">
            <div class="alliance-header">
                <div class="alliance-name">${a.name}</div>
                <button class="btn btn-small btn-purple" onclick="joinAlliance(${a.id})">加入</button>
            </div>
            <div class="alliance-members">${a.icon} ${a.memberCount}人</div>
        </div>
    `).join('') || '<div style="color:#888">暂无联盟</div>';
}

async function joinAlliance(id) {
    const r = await fetch(API + '/alliance/join', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({playerId: playerId, allianceId: id})
    }).then(r => r.json());
    
    toast(r.success ? '加入成功' : r.message);
    loadAlliance();
}

function showAllianceCreate() {
    const name = prompt('请输入联盟名称:');
    if(name) {
        fetch(API + '/alliance/create', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({playerId: playerId, name: name})
        }).then(r => r.json()).then(r => {
            toast(r.success ? '创建成功' : r.message);
            loadAlliance();
        });
    }
}

// 加载赛季
async function loadSeason() {
    const season = await fetch(API + '/season/current').then(r => r.json());
    const rank = await fetch(API + '/season/ranking').then(r => r.json());
    const credit = await fetch(API + '/season/credit?playerId=' + playerId).then(r => r.json());
    
    document.getElementById('current-season').innerHTML = season.success ? 
        `赛季${season.season.seasonNum} - ${season.season.status}` : '暂无赛季';
    
    document.getElementById('season-ranking').innerHTML = (rank.ranking || []).map((r,i) => `
        <div class="rank-item">
            <div class="rank-num">${i+1}</div>
            <div class="rank-info">
                <div class="rank-name">玩家${r.playerId}</div>
                <div class="rank-score">战功: ${r.credit} | 击杀: ${r.kills}</div>
            </div>
        </div>
    `).join('') || '暂无排行';
    
    document.getElementById('my-credits').innerHTML = credit.success ?
        `战功: ${credit.credit} | 击杀: ${credit.kills}` : '暂无战功';
}

// 初始化
if(playerId) {
    loadPlayerData();
    showScreen('main-screen');
}
</script>
</body>
</html>
