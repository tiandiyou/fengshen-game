server:
  port: 8080

spring:
  application:
    name: fengshen-game
  
  datasource:
    url: jdbc:h2:mem:fengshen;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

# JWT配置
jwt:
  secret: fengshen-game-secret-key-2026
  expiration: 86400000

# 游戏配置
game:
  gacha:
    big-pack-cost: 280
    small-pack-cost: 100
    purple-pack-cost: 100
