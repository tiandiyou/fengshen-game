server:
  port: 8080
  # Tomcat性能优化
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 10000

spring:
  application:
    name: fengshen-game
  
  datasource:
    url: jdbc:h2:mem:fengshen;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    # HikariCP连接池优化
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: FengshenHikariPool
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false  # 生产环境关闭
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
        # 批量操作优化
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # 缓存配置
  cache:
    type: simple
    cache-names: players,resources

# JWT配置
jwt:
  secret: fengshen-game-secret-key-2026
  expiration: 86400000

# 游戏配置
game:
  gacha:
    big-pack-cost: 280
    small-pack-cost: 100
    purple-pack-cost: 100
  battle:
    max-team-size: 5
  resource:
    tick-interval: 60000  # 资源产出间隔(毫秒)

# 性能监控
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: fengshen-game
