<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>封神榜 - 伐商演义</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        #game-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }
        .screen { display: none; min-height: 100vh; flex-direction: column; padding: 15px; }
        .screen.active { display: flex; }
        
        .title { font-size: 32px; color: #ffd700; text-align: center; margin: 20px 0; text-shadow: 0 0 20px #ff6b00; }
        .btn { background: linear-gradient(180deg, #ff6b00, #c41e3a); border: 2px solid #ffd700; color: #fff; padding: 12px 30px; font-size: 16px; border-radius: 20px; margin: 8px; cursor: pointer; }
        .btn:hover { transform: scale(1.05); }
        
        #title-screen { justify-content: center; align-items: center; text-align: center; }
        .menu-buttons { display: flex; flex-direction: column; gap: 15px; width: 80%; margin-top: 40px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #4a9eff; border-radius: 10px; background: rgba(0,0,0,0.3); color: #fff; font-size: 16px; text-align: center; }
        
        .top-bar { display: flex; justify-content: space-between; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-bottom: 15px; }
        
        .partner-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding-bottom: 60px; }
        .partner-card { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; border: 1px solid #333; }
        .partner-header { display: flex; align-items: center; gap: 8px; }
        .partner-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .chapter-list { display: flex; flex-direction: column; gap: 10px; padding-bottom: 60px; }
        .chapter-card { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .bottom-nav { display: flex; justify-content: space-around; padding: 10px; background: rgba(0,0,0,0.5); position: fixed; bottom: 0; width: 100%; max-width: 480px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #888; cursor: pointer; }
        .nav-item.active { color: #ffd700; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a2e; border: 2px solid #ffd700; border-radius: 16px; padding: 20px; max-width: 350px; text-align: center; }
        
        .toast { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #ffd700; padding: 12px 24px; border-radius: 25px; z-index: 2000; border: 1px solid #ffd700; }
        
        .shop-items { display: flex; flex-direction: column; gap: 10px; padding-bottom: 60px; }
        .shop-card { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 15px; display: flex; align-items: center; gap: 12px; }
        
        .signin-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin: 20px 0; }
        .signin-day { aspect-ratio: 1; background: rgba(255,255,255,0.1); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .signin-day.received { background: #27ae60; }
        
        .treasure-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding-bottom: 60px; }
        .treasure-card { background: rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #333; }
    </style>
</head>
<body>
<div id="game-container">
    <!-- 标题页 -->
    <div id="title-screen" class="screen active">
        <div style="font-size:48px;margin-top:60px">�封神榜�</div>
        <div class="title">伐商演义</div>
        <div style="color:#888;margin-bottom:30px">商朝末年，封神之战</div>
        <div class="menu-buttons">
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
    </div>

    <!-- 角色创建页 -->
    <div id="create-screen" class="screen">
        <div class="title">创建角色</div>
        <div class="input-group" style="max-width:300px;margin:0 auto">
            <input type="text" id="player-name" placeholder="输入你的名字" maxlength="8">
        </div>
        <button class="btn" onclick="createCharacter()">进入游戏</button>
    </div>

    <!-- 主界面 -->
    <div id="main-screen" class="screen">
        <div class="top-bar">
            <span>💎 <span id="lingqi">0</span></span>
            <span>💰 <span id="gold">0</span></span>
            <span>⚔️ <span id="zhanli">0</span></span>
        </div>
        <div style="padding-bottom:60px">
            <div id="partners-list" class="partner-list"></div>
        </div>
        <div class="bottom-nav">
            <div class="nav-item active" onclick="showTab('partners')"><span style="font-size:20px">👥</span><span>伙伴</span></div>
            <div class="nav-item" onclick="showTab('battle')"><span style="font-size:20px">⚔️</span><span>战斗</span></div>
            <div class="nav-item" onclick="showTab('treasures')"><span style="font-size:20px">🔮</span><span>法宝</span></div>
            <div class="nav-item" onclick="showTab('shop')"><span style="font-size:20px">🛒</span><span>商城</span></div>
        </div>
    </div>

    <!-- 战斗界面 -->
    <div id="battle-screen" class="screen">
        <div class="title" style="font-size:24px">关卡</div>
        <div id="chapter-list" class="chapter-list"></div>
    </div>

    <!-- 法宝界面 -->
    <div id="treasures-screen" class="screen">
        <div class="title" style="font-size:24px">法宝</div>
        <div id="treasure-list" class="treasure-list"></div>
    </div>

    <!-- 商城界面 -->
    <div id="shop-screen" class="screen">
        <div class="title" style="font-size:24px">商城</div>
        <div id="shop-list" class="shop-items"></div>
    </div>
</div>

<!-- 弹窗 -->
<div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="modal-title" style="color:#ffd700;margin-bottom:15px">提示</h3>
        <p id="modal-text"></p>
        <button class="btn" onclick="closeModal()">确定</button>
    </div>
</div>

<script>
// 游戏数据
const GAME_DATA = {
    partners: [
        { id: 1, name: '哪吒', icon: '🔥', quality: 'red', hp: 1200, atk: 180 },
        { id: 2, name: '杨戬', icon: '🐕', quality: 'red', hp: 1100, atk: 160 },
        { id: 3, name: '雷震子', icon: '⚡', quality: 'purple', hp: 1000, atk: 150 },
        { id: 4, name: '姜子牙', icon: '📜', quality: 'orange', hp: 900, atk: 140 }
    ],
    treasures: [
        { id: 1, name: '乾坤圈', icon: '⭕', bonus: '暴击+15%' },
        { id: 2, name: '风火轮', icon: '🔥', bonus: '速度+20' },
        { id: 3, name: '混天绫', icon: '🟥', bonus: '防御+10%' },
        { id: 4, name: '打神鞭', icon: '📿', bonus: '伤害+20%' }
    ],
    chapters: [
        { id: 1, name: '第一章', title: '陈塘关', desc: '哪吒闹海' },
        { id: 2, name: '第二章', title: '渭水河', desc: '姜子牙下山' },
        { id: 3, name: '第三章', title: '西岐', desc: '文王访贤' },
        { id: 4, name: '第四章', title: '佳梦关', desc: '魔家四将' },
        { id: 5, name: '第五章', title: '青龙关', desc: '哼哈二将' },
        { id: 6, name: '第六章', title: '汜水关', desc: '余元余化' }
    ],
    shop: [
        { id: 1, name: '灵气100', icon: '💎', price: 10 },
        { id: 2, name: '金币500', icon: '💰', price: 10 },
        { id: 3, name: '单抽', icon: '🎫', price: 50 },
        { id: 4, name: '首充6元', icon: '🎁', price: 6, special: true }
    ]
};

let state = { name: '', lingqi: 200, gold: 100, partners: [], treasures: [] };

// 初始化
function init() {
    const saved = localStorage.getItem('fengshen_save');
    if (saved) {
        state = JSON.parse(saved);
        if (state.name) showScreen('main-screen');
    }
    renderAll();
}

function save() {
    localStorage.setItem('fengshen_save', JSON.stringify(state));
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function showTab(tab) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    event.target.closest('.nav-item').classList.add('active');
    
    if (tab === 'partners') renderPartners();
    else if (tab === 'battle') renderChapters();
    else if (tab === 'treasures') renderTreasures();
    else if (tab === 'shop') renderShop();
}

function renderAll() {
    document.getElementById('lingqi').textContent = state.lingqi;
    document.getElementById('gold').textContent = state.gold;
    document.getElementById('zhanli').textContent = calcZhanli();
    renderPartners();
    renderChapters();
    renderTreasures();
    renderShop();
}

function calcZhanli() {
    return state.partners.reduce((sum, p) => sum + p.hp + p.atk * 2, 0) + state.name.length * 10;
}

function renderPartners() {
    const list = document.getElementById('partners-list');
    if (state.partners.length === 0) {
        list.innerHTML = '<div style="grid-column:span 2;text-align:center;padding:40px;color:#888">暂无伙伴<br><button class="btn" style="margin-top:20px" onclick="gacha()">抽卡</button></div>';
        return;
    }
    list.innerHTML = state.partners.map(p => `
        <div class="partner-card">
            <div class="partner-header">
                <div class="partner-avatar">${p.icon}</div>
                <div>
                    <div style="font-weight:bold">${p.name}</div>
                    <div style="font-size:10px;color:#888">等级${p.level||1}</div>
                </div>
            </div>
            <div style="font-size:11px;color:#888;margin-top:8px">
                生命 ${p.hp} | 攻击 ${p.atk}
            </div>
        </div>
    `).join('');
}

function renderChapters() {
    const list = document.getElementById('chapter-list');
    list.innerHTML = GAME_DATA.chapters.map(c => `
        <div class="chapter-card" onclick="enterBattle(${c.id})">
            <div>
                <div style="font-weight:bold">${c.name}</div>
                <div style="font-size:12px;color:#888">${c.title} - ${c.desc}</div>
            </div>
            <button class="btn btn-small">前往</button>
        </div>
    `).join('');
}

function renderTreasures() {
    const list = document.getElementById('treasure-list');
    if (state.treasures.length === 0) {
        list.innerHTML = '<div style="grid-column:span 2;text-align:center;padding:40px;color:#888">暂无法宝</div>';
        return;
    }
    list.innerHTML = state.treasures.map(t => `
        <div class="treasure-card">
            <div style="font-size:28px">${t.icon}</div>
            <div style="font-weight:bold;margin:5px 0">${t.name}</div>
            <div style="font-size:11px;color:#ffd700">${t.bonus}</div>
        </div>
    `).join('');
}

function renderShop() {
    const list = document.getElementById('shop-list');
    list.innerHTML = GAME_DATA.shop.map(s => `
        <div class="shop-card">
            <div style="font-size:28px">${s.icon}</div>
            <div style="flex:1">
                <div style="font-weight:bold">${s.name}</div>
                <div style="font-size:11px;color:#888">${s.special ? '限时优惠' : '购买'}</div>
            </div>
            <button class="btn btn-small" onclick="buy(${s.id})">${s.price}元</button>
        </div>
    `).join('');
}

function startGame() {
    if (state.name) {
        showScreen('main-screen');
    } else {
        showScreen('create-screen');
    }
}

function createCharacter() {
    const name = document.getElementById('player-name').value.trim() || '阐教弟子';
    state.name = name;
    // 送哪吒
    const data = GAME_DATA.partners[0];
    state.partners.push({...data, level: 1});
    save();
    showScreen('main-screen');
    renderAll();
    showToast('欢迎 ' + name + '！获得初始伙伴哪吒！');
}

function gacha() {
    if (state.lingqi < 50) {
        showModal('提示', '灵气不足，需要50灵气');
        return;
    }
    state.lingqi -= 50;
    const p = GAME_DATA.partners[Math.floor(Math.random() * GAME_DATA.partners.length)];
    state.partners.push({...p, level: 1});
    save();
    renderAll();
    showModal('抽卡结果', `获得伙伴 ${p.name} ${p.icon}`);
}

function buy(id) {
    const item = GAME_DATA.shop.find(s => s.id === id);
    if (id === 4) {
        showModal('首充', '首充功能开发中...');
        return;
    }
    showModal('购买', item.name + ' 需要 ' + item.price + ' 元（模拟）');
}

function enterBattle(id) {
    showModal('战斗', '第' + id + '章战斗功能开发中...');
}

function showModal(title, text) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-text').textContent = text;
    document.getElementById('modal').classList.add('active');
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
}

init();
</script>
</body>
</html>
