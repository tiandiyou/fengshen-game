<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>封神榜 - 伐商演义</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei";background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;color:#fff}
#game-container{max-width:480px;margin:0 auto;min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column;padding:12px}
.screen.active{display:flex}
.title{font-size:22px;color:#ffd700;text-align:center;margin:10px 0}
.btn{background:linear-gradient(180deg,#ff6b00,#c41e3a);border:2px solid #ffd700;color:#fff;padding:8px 14px;font-size:12px;border-radius:12px;margin:4px;cursor:pointer}
.btn-small{padding:5px 10px;font-size:10px}
.btn-green{background:linear-gradient(180deg,#27ae60,#1e8449)}
.input-group{margin-bottom:10px}
.input-group input{width:100%;padding:8px;border:2px solid #4a9eff;border-radius:6px;background:rgba(0,0,0,0.3);color:#fff;font-size:13px;text-align:center}
.top-bar{display:flex;justify-content:space-between;padding:6px 10px;background:rgba(0,0,0,0.3);border-radius:6px;margin-bottom:8px;font-size:10px}
.partner-list{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding-bottom:55px}
.partner-card{background:rgba(255,255,255,0.08);border-radius:8px;padding:8px;border:1px solid #333;position:relative}
.partner-card.selected{border-color:#ffd700}
.star{color:#ffd700;font-size:9px}
.partner-header{display:flex;align-items:center;gap:6px}
.partner-avatar{width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:13px}
.upgrade-btn{position:absolute;top:3px;right:3px;font-size:8px;padding:2px 5px;background:#27ae60;border-radius:5px}
.chapter-list,.quest-list,.rank-list{display:flex;flex-direction:column;gap:6px;padding-bottom:55px}
.chapter-card,.quest-card,.rank-card{background:rgba(255,255,255,0.08);border-radius:8px;padding:8px;display:flex;justify-content:space-between;align-items:center}
.bottom-nav{display:flex;justify-content:space-around;padding:6px;background:rgba(0,0,0,0.5);position:fixed;bottom:0;width:100%;max-width:480px}
.nav-item{display:flex;flex-direction:column;align-items:center;font-size:8px;color:#888;cursor:pointer;padding:3px 6px}
.nav-item.active{color:#ffd700}
.tab-content{display:none}
.tab-content.active{display:block}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:1000}
.modal.active{display:flex}
.modal-content{background:#1a1a2e;border:2px solid #ffd700;border-radius:12px;padding:20px;max-width:280px;text-align:center}
.toast{position:fixed;top:12%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:#ffd700;padding:10px 20px;border-radius:10px;z-index:2000}
.quest-reward{font-size:9px;color:#ffd700}
.gacha-card{background:linear-gradient(180deg,#1a1a2e,#0d1b2a);border:3px solid #ffd700;border-radius:12px;padding:12px;margin:10px 0}
</style>
</head>
<body>
<div id="game-container">
<div id="title-screen" class="screen active" style="justify-content:center;align-items:center;text-align:center">
<div style="font-size:34px;margin-top:40px">⚔封神榜⚔</div>
<div class="title" style="margin-top:6px">伐商演义</div>
<div style="color:#888;margin-bottom:18px">商朝末年，封神之战</div>
<button class="btn" onclick="showLogin()">开始游戏</button>
</div>
<div id="login-screen" class="screen">
<div class="title">登录 / 注册</div>
<div class="input-group" style="max-width:220px;margin:0 auto"><input type="text" id="username" placeholder="输入用户名"></div>
<button class="btn" onclick="doLogin()">登录</button>
<button class="btn" style="background:#9b59b6" onclick="doRegister()">注册</button>
<button class="btn btn-small" onclick="showScreen('title-screen')">返回</button>
</div>
<div id="main-screen" class="screen">
<div class="top-bar"><span>💎 <span id="lingqi">0</span></span><span>💰 <span id="gold">0</span></span><span>⚔ <span id="zhanli">0</span></span></div>
<div id="tab-partners" class="tab-content active"><div style="margin-bottom:6px;font-size:10px;color:#888">点击选择 | ↑升级 | 抽卡</div><div id="partners-list" class="partner-list"></div></div>
<div id="tab-battle" class="tab-content"><div id="chapter-list" class="chapter-list"></div></div>
<div id="tab-quests" class="tab-content"><div id="quest-list" class="quest-list"></div></div>
<div id="tab-rank" class="tab-content"><div id="rank-list" class="rank-list"></div></div>
<div class="bottom-nav">
<div class="nav-item active" onclick="showTab('partners')"><span style="font-size:14px">👥</span><span>伙伴</span></div>
<div class="nav-item" onclick="showTab('battle')"><span style="font-size:14px">⚔</span><span>战斗</span></div>
<div class="nav-item" onclick="showTab('quests')"><span style="font-size:14px">📋</span><span>任务</span></div>
<div class="nav-item" onclick="showTab('rank')"><span style="font-size:14px">🏆</span><span>排行</span></div>
</div>
</div>
</div>
<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-content" onclick="event.stopPropagation()">
<h3 id="modal-title" style="color:#ffd700;margin-bottom:10px">提示</h3>
<p id="modal-text" style="margin-bottom:15px"></p>
<button class="btn" onclick="closeModal()">确定</button>
</div>
</div>
<script>
var GAME_DATA={partners:[{id:1,name:"哪吒",icon:"🔥",quality:"red",hp:1200,atk:180,skills:["火尖枪","乾坤圈","风火轮"]},{id:2,name:"杨戬",icon:"🐕",quality:"red",hp:1100,atk:160,skills:["八九玄功","哮天犬"]},{id:3,name:"雷震子",icon:"⚡",quality:"purple",hp:1000,atk:150,skills:["风雷棍"]},{id:4,name:"姜子牙",icon:"📜",quality:"orange",hp:900,atk:140,skills:["打神鞭","封神榜"]},{id:5,name:"金吒",icon:"🗡️",quality:"purple",hp:950,atk:145,skills:["遁龙桩"]},{id:6,name:"木吒",icon:"🎋",quality:"purple",hp:930,atk:140,skills:["混天绫"]},{id:7,name:"李靖",icon:"🏰",quality:"purple",hp:1100,atk:120,skills:["玲珑宝塔"]},{id:8,name:"纣王",icon:"👑",quality:"orange",hp:1500,atk:170,skills:["天子剑"]},{id:9,name:"妲己",icon:"🦊",quality:"orange",hp:800,atk:200,skills:["魅惑"]},{id:10,name:"申公豹",icon:"🐆",quality:"orange",hp:950,atk:165,skills:["开天珠"]},{id:11,name:"赵公明",icon:"💰",quality:"orange",hp:1300,atk:175,skills:["定海珠"]},{id:12,name:"闻仲",icon:"👁️",quality:"orange",hp:1400,atk:150,skills:["雌雄双鞭"]}],chapters:[{id:1,name:"第一章",title:"陈塘关",desc:"哪吒闹海",enemies:[{name:"巡海夜叉",hp:300,atk:30,icon:"👹"},{name:"敖丙",hp:800,atk:80,icon:"🐉"}],reward:{lingqi:100,gold:50}},{id:2,name:"第二章",title:"渭水河",desc:"姜子牙下山",enemies:[{name:"渔夫",hp:400,atk:40,icon:"🎣"},{name:"樵夫",hp:450,atk:45,icon:"🪓"}],reward:{lingqi:150,gold:80}},{id:3,name:"第三章",title:"西岐",desc:"文王访贤",enemies:[{name:"纣使",hp:500,atk:50,icon:"👮"},{name:"官兵",hp:600,atk:60,icon:"💂"}],reward:{lingqi:200,gold:100}},{id:4,name:"第四章",title:"佳梦关",desc:"魔家四将",enemies:[{name:"魔礼青",hp:800,atk:90,icon:"🌿"},{name:"魔礼红",hp:850,atk:95,icon:"🔥"}],reward:{lingqi:300,gold:150}},{id:5,name:"第五章",title:"青龙关",desc:"哼哈二将",enemies:[{name:"郑伦",hp:900,atk:100,icon:"🤨"},{name:"陈奇",hp:950,atk:105,icon:"😤"}],reward:{lingqi:350,gold:180}},{id:6,name:"第六章",title:"汜水关",desc:"余元余化",enemies:[{name:"余化",hp:1000,atk:120,icon:"⚔️"},{name:"余元",hp:1200,atk:130,icon:"🧙"}],reward:{lingqi:400,gold:200}}],quests:[{id:1,name:"初战告捷",desc:"完成第一章",reward:50},{id:2,name:"伙伴招募",desc:"拥有5个伙伴",reward:100},{id:3,name:"战力提升",desc:"总战力达到1000",reward:150},{id:4,name:"连续挑战",desc:"完成3场战斗",reward:100},{id:5,name:"法宝收集",desc:"拥有3件法宝",reward:200}]};

function showScreen(id){document.querySelectorAll('.screen').forEach(function(x){x.classList.remove('active')});document.getElementById(id).classList.add('active')}
function showLogin(){showScreen('login-screen')}
function showTab(tab){document.querySelectorAll('.nav-item').forEach(function(x){x.classList.remove('active')});event.target.closest('.nav-item').classList.add('active');document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active')});document.getElementById('tab-'+tab).classList.add('active');if(tab==='partners')renderPartners();else if(tab==='battle')renderChapters();else if(tab==='quests')renderQuests();else if(tab==='rank')renderRank();}
function showToast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2000);}
function showModal(txt,tit){document.getElementById('modal-title').textContent=tit||'提示';document.getElementById('modal-text').innerHTML=txt;document.getElementById('modal').classList.add('active')}
function closeModal(){document.getElementById('modal').classList.remove('active')}

var state={player:null,partners:[],selected:[],battleCount:0,chapterId:0};

function save(){localStorage.setItem('fengshen_data',JSON.stringify(state))}
function load(){var s=localStorage.getItem('fengshen_data');if(s){state=JSON.parse(s);return true;}return false;}

function doRegister(){
    var name=document.getElementById('username').value.trim();
    if(!name){showModal('请输入用户名');return;}
    state.player={name:name,lingqi:200,gold:100};
    var p=GAME_DATA.partners[0];
    state.partners=[{name:p.name,icon:p.icon,quality:p.quality,hp:p.hp,atk:p.atk,level:1,star:0}];
    state.selected=[0];
    state.battleCount=0;
    state.chapterId=0;
    save();
    showToast('注册成功！获得哪吒！');
    showScreen('main-screen');
    renderAll();
}

function doLogin(){
    if(load()){showScreen('main-screen');renderAll();}
    else{showModal('未找到账号，请先注册');}
}

function renderAll(){
    document.getElementById('lingqi').textContent=state.player.lingqi;
    document.getElementById('gold').textContent=state.player.gold;
    document.getElementById('zhanli').textContent=calcZhanli();
}

function calcZhanli(){
    return state.partners.reduce(function(s,p){return s+(p.hp||0)+(p.atk||0)*2;},0)+(state.player.name.length||0)*10;
}

function renderPartners(){
    var list=document.getElementById('partners-list');
    if(state.partners.length===0){
        list.innerHTML='<div style="grid-column:span2;text-align:center;padding:20px;color:#888">暂无伙伴<br><button class="btn" style="margin-top:10px" onclick="doGacha()">抽卡</button></div>';
        return;
    }
    list.innerHTML=state.partners.map(function(p,i){
        var sel=state.selected.indexOf(i)>=0?'selected':'';
        var cost=Math.floor(50*Math.pow(1.5,p.level));
        var stars='★'.repeat(p.star||0);
        return '<div class="partner-card '+sel+'" onclick="togglePartner('+i+')"><div class="partner-header"><div class="partner-avatar">'+p.icon+'</div><div><div style="font-weight:bold;font-size:11px">'+p.name+'</div><div style="font-size:8px;color:#888">Lv.'+p.level+'</div></div></div><div class="star">'+stars+'</div><div style="font-size:8px;color:#aaa">♥ '+p.hp+' | ⚔ '+p.atk+'</div><button class="upgrade-btn" onclick="event.stopPropagation();upgradePartner('+i+')">↑'+cost+'</button></div>';
    }).join('')+'<div style="grid-column:span2;text-align:center;padding:10px"><button class="btn" onclick="doGacha()">抽卡 (50灵气)</button></div>';
}

function togglePartner(idx){
    var i=state.selected.indexOf(idx);
    if(i>=0)state.selected.splice(i,1);
    else if(state.selected.length<5)state.selected.push(idx);
    else{showToast('最多选择5个伙伴');return;}
    save();renderPartners();
}

function upgradePartner(idx){
    var p=state.partners[idx];
    var cost=Math.floor(50*Math.pow(1.5,p.level));
    if(state.player.lingqi<cost){showModal('升级需要'+cost+'灵气');return;}
    state.player.lingqi-=cost;
    p.level++;
    p.hp=Math.floor(p.hp*1.1);
    p.atk=Math.floor(p.atk*1.1);
    save();renderAll();showToast(p.name+' 升级到 Lv.'+p.level);
}

function doGacha(){
    if(state.player.lingqi<50){showModal('抽卡需要50灵气');return;}
    state.player.lingqi-=50;
    var r=Math.random(),q;
    if(r<0.03)q='red';else if(r<0.15)q='orange';else if(r<0.40)q='purple';else q='blue';
    var cand=GAME_DATA.partners.filter(function(p){if(q==='red')return p.quality==='red';if(q==='orange')return p.quality==='orange'||p.quality==='red';return true});
    var p=cand[Math.floor(Math.random()*cand.length)];
    var np={name:p.name,icon:p.icon,quality:p.quality,hp:p.hp,atk:p.atk,level:1,star:0};
    state.partners.push(np);
    if(state.selected.length<5)state.selected.push(state.partners.length-1);
    save();renderAll();
    var c={red:'#e74c3c',orange:'#e67e22',purple:'#9b59b6',blue:'#3498db'};
    showModal('<div class="gacha-card" style="border-color:'+c[q]+'"><div style="font-size:30px">'+p.icon+'</div><div style="color:#ffd700;font-weight:bold;margin-top:4px">'+p.name+'</div><div style="font-size:9px;color:'+c[q]+'">'+q.toUpperCase()+'品质</div></div>','抽卡结果');
}

function renderChapters(){
    var list=document.getElementById('chapter-list');
    list.innerHTML=GAME_DATA.chapters.map(function(c){
        var passed=state.chapterId>=c.id;
        return '<div class="chapter-card"><div><div style="font-weight:bold">'+c.name+'</div><div style="font-size:9px;color:#888">'+c.title+' - '+c.desc+'</div></div><div><button class="btn btn-small" onclick="startBattle('+c.id+')">'+(passed?'扫荡':'战斗')+'</button></div></div>';
    }).join('');
}

function startBattle(id){
    if(state.selected.length===0){showModal('请先选择伙伴');return;}
    var ch=GAME_DATA.chapters.find(function(c){return c.id===id});
    var enemies=ch.enemies.map(function(e){return{name:e.name,hp:e.hp,atk:e.atk,icon:e.icon,currentHp:e.hp}});
    var players=state.selected.map(function(i){var p=state.partners[i];return{name:p.name,hp:p.hp,atk:p.atk,icon:p.icon,currentHp:p.hp}});
    var log=['战斗开始！'];
    while(players.length>0 && enemies.length>0){
        var pa=players[0],ea=enemies[0];
        var dmg=Math.max(1,pa.atk-Math.floor(Math.random()*20));
        ea.currentHp-=dmg;
        log.push('⚔ '+pa.name+' 攻击 '+ea.name+'，造成 '+dmg+' 伤害');
        if(ea.currentHp<=0){enemies.shift();if(enemies.length===0)break;}
        var edmg=Math.max(1,ea.atk-Math.floor(Math.random()*25));
        pa.currentHp-=edmg;
        log.push('💢 '+ea.name+' 反击 '+pa.name+'，造成 '+edmg+' 伤害');
        if(pa.currentHp<=0){players.shift();}
    }
    if(players.length>0){
        state.player.lingqi+=ch.reward.lingqi;
        state.player.gold+=ch.reward.gold;
        state.battleCount++;
        if(id>state.chapterId)state.chapterId=id;
        save();
        showModal('🎉 战斗胜利！\n\n'+log.slice(-4).join('\n')+'\n\n获得 '+ch.reward.lingqi+'灵气 '+ch.reward.gold+'金币','战斗结果');
    }else{
        showModal('💀 战斗失败！\n\n'+log.slice(-4).join('\n'),'战斗结果');
    }
    renderAll();
}

function renderQuests(){
    var list=document.getElementById('quest-list');
    list.innerHTML=GAME_DATA.quests.map(function(q){
        var done=isQuestComplete(q);
        return '<div class="quest-card"><div><div style="font-weight:bold;font-size:11px">'+q.name+'</div><div style="font-size:9px;color:#888">'+q.desc+'</div></div><div style="text-align:right"><div class="quest-reward">💎'+q.reward+'</div><button class="btn btn-small btn-green" onclick="claimQuest('+q.id+')">'+(done?'领取':q.reward)+'</button></div></div>';
    }).join('');
}

function isQuestComplete(q){
    if(q.id===1)return state.chapterId>=1;
    if(q.id===2)return state.partners.length>=5;
    if(q.id===3)return calcZhanli()>=1000;
    if(q.id===4)return state.battleCount>=3;
    if(q.id===5)return state.partners.length>=3;
    return false;
}

function claimQuest(id){
    var q=GAME_DATA.quests.find(function(x){return x.id===id});
    if(!isQuestComplete(q)){showModal('任务未完成');return;}
    state.player.lingqi+=q.reward;
    save();renderAll();showToast('任务完成！+'+q.reward+'灵气');
}

function renderRank(){
    var list=document.getElementById('rank-list');
    list.innerHTML='<div class="rank-card"><div style="width:20px;font-size:11px;font-weight:bold;color:#ffd700">1</div><div style="flex:1"><div style="font-size:11px">战力榜</div><div style="font-size:9px;color:#888">战力:'+calcZhanli()+'</div></div></div><div class="rank-card"><div style="width:20px;font-size:11px;font-weight:bold;color:#ffd700">2</div><div style="flex:1"><div style="font-size:11px">伙伴榜</div><div style="font-size:9px;color:#888">数量:'+state.partners.length+'</div></div></div>';
}
</script>
</body>
</html>
